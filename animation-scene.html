<!DOCTYPE html>
<html>
    <head>
<script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
<title>Radioactive Signals</title>
  </head>
       <body>
              <a-scene>
                 <!-- Set the sky -->
                   <a-sky color="white"></a-sky>
                     <a-box color="green" position="1 1 -30" scale="5 5 5" animation=" property:position; from:1 1 -30; to:1 1 -6; dir:alternate; dur:2500; loop:true;"> </a-box>
                    <a-cone color="yellow" radius-bottom="3" radius-top=".5" position="1 5 -30" height="3"animation="property:position; from:1 5 -30;  to:1 5 -6; dir:alternate; dur:2500; loop:true;"
                      animation__rotation="property:rotation; from: 0 0 0; to: 360 0 0; loop: true; dir: alternate; dur:2500;"></a-cone>
                      <a-box color="blue" position="-2 2 -6" scale="1 1 1" animation="property:position; from:-2 2 -6; to:2 4 -9; dir:alternate; dur:3000; loop:true;"></a-box>
                      <a-box color="blue" position="7 2 -6" scale="1 1 1" animation="property:position; from:7 2 -6; to:3 4 -9; dir:alternate; dur:3000; loop:true;"></a-box>
                      animation__sclae></a-box>
                </a-scene>
                                                                                                                                                                                    </body>
