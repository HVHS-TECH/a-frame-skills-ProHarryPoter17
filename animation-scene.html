<!DOCTYPE html>
<html>
    <head>
            <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
                    <title>Radioactive Signals</title>
                        </head>
                            <body>
                                    <a-scene>
                                                <!-- Set the sky -->
                                                            <a-sky color="white"></a-sky>
                                                                        <a-box color="green" position="1 1 -30" scale="5 5 5" animation="
                                                                                    property:position; 
                                                                                                from:1 1 -30; 
                                                                                                            to:1 1 -6; 
                                                                                                                        dir:alternate; 
                                                                                                                                    dur:2500; 
                                                                                                                                                loop:true;
                                                                                                                                                            "
                                                                                                                                                                        > </a-box>
                                                                                                                                                                                </a-scene>
                                                                                                                                                                                    </body>
                                                                                                                                                                                    </html>
                                                                                                                                                                                    >
